version: "3.8"

services:
  orcad-checker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orcad-checker-server
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro          # Oracle 数据库配置 (database.yaml)
      - ./rules:/app/rules               # 规则配置热更新
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/checkers').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
